<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doorbell RTC</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Doorbell RTC</h1>

  <div id="start-section">
    <button id="start-btn">Start Doorbell</button>
  </div>

  <div id="profiles-section" style="display: none;">
    <div class="profile-card">
      <div class="profile-avatar host-avatar" role="img" aria-label="Host display picture"></div>
      <span>Host</span>
    </div>
    <div class="profile-card">
      <div class="profile-avatar visitor-avatar" role="img" aria-label="Visitor display picture"></div>
      <span>Visitor</span>
    </div>
  </div>

  <div id="homeowner-section" style="display: none;">
    <button id="generate-btn">Generate Doorbell Link / QR</button>
    <p id="link-display">Link will appear here</p>
    <div id="qrcode"></div>

    <p id="homeowner-status">Waiting for visitor...</p>
  </div>

  <div id="visitor-section" style="display: none;">
    <p id="visitor-greeting">You're at the door! Send a message or photo.</p>

    <input id="message-input" type="text" placeholder="Type message..." />
    <button id="ring-btn">Ring Host</button>
    <button id="send-btn">Send Message</button>
    <button id="waiting-btn">I'm Waiting</button>
    <button id="stop-ring-btn" style="display: none;">Stop Ringing</button>

    <div id="chat-history"></div>

    <p id="visitor-status">Connecting...</p>
  </div>

  <div id="sound-section" style="display: none;">
    <button id="enable-sound-btn">Enable Sound</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
