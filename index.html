<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rooBell</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body id="top">
  <div class="app-header">
    <div class="circular-board">
      <img src="1%20Pictures/7.png" alt="rooBell logo">
    </div>
  </div>

  <div id="start-section">
    <button id="start-btn" class="start-logo" type="button" aria-label="Start rooBell">
      <img src="1%20Pictures/7.png" alt="rooBell logo">
    </button>
    <p id="start-prompt">Start rooBell</p>
  </div>

  <div id="host-jump-row" style="display: none;">
    <a class="host-jump-link" href="#homeowner-section">Go to QR code</a>
  </div>

  <div id="visitor-section" style="display: none;">
    <p id="visitor-greeting">You're at the door! Send a message or photo.</p>

    <button id="ring-btn">Ring Host</button>
    <button id="waiting-btn">I'm Waiting</button>
    <button id="stop-ring-btn" style="display: none;">Stop Ringing</button>

    <p id="homeowner-status">Waiting for visitor...</p>

    <div id="chat-stage">
      <div class="chat-avatar remote-avatar" role="img" aria-label="Other participant display picture"></div>
      <div class="avatar-label remote-label"></div>

      <div id="chat-history">
        <p id="visitor-status">Connecting...</p>
      </div>

      <div class="chat-avatar self-avatar" role="img" aria-label="Your display picture"></div>
      <div class="avatar-label self-label"></div>
    </div>

    <div id="chat-composer">
      <input id="message-input" type="text" placeholder="Type message..." />
      <button id="send-btn">Send Message</button>
    </div>

  </div>

  <div id="sound-section" style="display: none;">
    <button id="enable-sound-btn">Enable Sound</button>

    <div id="photo-section">
      <button id="upload-photo-btn">Take photo of where I am</button>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display: none" />
      <button id="choose-photo-btn">Upload existing photo</button>
      <input type="file" id="choose-photo-input" accept="image/*" style="display: none" />
      <button id="view-photo-btn" style="display: none;">View their photo</button>
      <div id="multi-photo-buttons" style="margin-top: 8px;"></div>
      <p id="photo-status" style="font-size: 13px; color: #666; margin-top: 4px;"></p>
    </div>
  </div>

  <div id="homeowner-section" style="display: none;">
    <button id="generate-btn">Generate rooBell Link / QR</button>
    <button id="print-qr-btn" type="button">Print QR Code</button>

    <p id="link-display">Link will appear here</p>
    <div id="qrcode"></div>
  </div>

  <div id="host-back-row" style="display: none;">
    <a class="host-jump-link" href="#top">Back to chat</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
